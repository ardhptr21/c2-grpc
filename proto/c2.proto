syntax = "proto3";

package c2grpc;

option go_package = "github.com/ardhptr21/c2-grpc/pb";

service AgentService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Unregister(UnregisterRequest) returns (UnregisterResponse);
}

service HeartbeatService {
  rpc SendHeartbeat(stream HeartbeatRequest) returns (HeartbeatSummary);
}

service TaskService {
  rpc ReceiveTasks(TaskRequest) returns (stream Task);
}

service OutputService {
  rpc SendOutput(stream OutputChunk) returns (OutputAck);
}

service OperatorService {
  rpc Connect(stream OperatorCommand) returns (stream OperatorEvent);
}

service HistoryService {
  rpc ListAgentHistory(AgentHistoryRequest) returns (AgentHistoryResponse);
}

service ShellService {
  rpc AgentShell(stream AgentShellEvent) returns (stream OperatorShellRequest);
  rpc OperatorShell(stream OperatorShellRequest) returns (stream AgentShellEvent);
}

message RegisterRequest {
  string hostname = 1;
  string os = 2;
  string ip = 3;
  string machine_id = 4;
}

message RegisterResponse {
  string agent_id = 1;
  string message = 2;
}

message UnregisterRequest {
  string agent_id = 1;
}

message UnregisterResponse {
  bool success = 1;
  string message = 2;
}

message HeartbeatRequest {
  string agent_id = 1;
  string status = 2;
  int64 timestamp = 3;
}

message HeartbeatSummary {
  int32 total_received = 1;
  string last_status = 2;
}

message TaskRequest {
  string agent_id = 1;
}

message Task {
  string task_id = 1;
  string command = 2;
  string args = 3;
}

message OutputChunk {
  string task_id = 1;
  string agent_id = 2;
  string line = 3;
}

message OutputAck {
  string task_id = 1;
  bool success = 2;
}

message OperatorCommand {
  string target_agent_id = 1;
  string command = 2;
  string args = 3;
}

message OperatorEvent {
  string type = 1;
  string agent_id = 2;
  string payload = 3;
}

message AgentHistoryRequest {
  string agent_id = 1;
  int32 limit = 2;
}

message AgentHistoryEntry {
  string task_id = 1;
  string agent_id = 2;
  string command = 3;
  string args = 4;
  string output = 5;
  int64 executed_at = 6;
  int64 completed_at = 7;
}

message AgentHistoryResponse {
  repeated AgentHistoryEntry entries = 1;
}

message OperatorShellRequest {
  string type = 1;
  string session_id = 2;
  string agent_id = 3;
  string data = 4;
  int32 cols = 5;
  int32 rows = 6;
}

message AgentShellEvent {
  string type = 1;
  string session_id = 2;
  string agent_id = 3;
  string data = 4;
  string message = 5;
}
